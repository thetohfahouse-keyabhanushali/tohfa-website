<!DOCTYPE html>
<html>
<head>
  <title>Tohfa by Keya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial; background:#f8f6f2; text-align:center; }
    header { padding:20px; background:white; }
    h1 { margin-top:60px; }
    .section { padding:60px 20px; }
    .card {
      background:white;
      padding:20px;
      margin:20px auto;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      padding:10px 20px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }
    footer {
      background:black;
      color:white;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <h2>Tohfa by Keya</h2>
</header>

<h1>Where Stories Turn Into Beautiful Gifts</h1>

<div class="section">
  <h2>Our Hampers</h2>

  <div class="card">
    <h3>Birthday Hamper</h3>
    <p>Luxury customized birthday gifting experience.</p>
    <button onclick="orderNow('Birthday Hamper')">Order on WhatsApp</button>
  </div>

  <div class="card">
    <h3>Bridesmaid Box</h3>
    <p>Elegant bridesmaid proposal box.</p>
    <button onclick="orderNow('Bridesmaid Box')">Order on WhatsApp</button>
  </div>

</div>

<div class="section">
  <h2>Creative Studio</h2>
  <p>Wedding Invitations | E-Invites | Reel Edits | Branding</p>
</div>

<footer>
  © 2026 Tohfa by Keya
</footer>

<script>
function orderNow(product) {
  const phoneNumber = "91XXXXXXXXXX"; 
  const message = `Hi, I want to order the ${product} from Tohfa.`;
  const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
